name: Freya's Stock 每日自动更新

on:
  schedule:
    # 每天 UTC 1:00 = 北京时间 9:00
    - cron: '0 1 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  update-stock:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        run: |
          pip install yfinance requests

      - name: 🔄 运行更新脚本
        run: |
          python daily_update.py

      - name: 📤 提交更新
        run: |
          git config user.name "Freya Stock Bot"
          git config user.email "bot@freyastock.com"
          git add index.html
          # 如果有变更才提交
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 每日自动更新 $(date '+%Y-%m-%d %H:%M')"
          git push
